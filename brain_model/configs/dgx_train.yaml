# ╔══════════════════════════════════════════════════════════════╗
# ║  Brain Model - DGX A100 Training Config (LLaMA-Factory)    ║
# ║  Qwen2.5-VL-7B-Instruct | LoRA rank 64 | bf16 full        ║
# ╚══════════════════════════════════════════════════════════════╝

### Model ###
model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
trust_remote_code: true

### Method ###
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all  # all linear layers

### Dataset ###
dataset_dir: ../data/training
dataset: brain_train
template: qwen2_vl
cutoff_len: 4096
preprocessing_num_workers: 16

### Output ###
output_dir: ../brain_model/checkpoints/dgx
logging_dir: ../brain_model/logs/dgx
logging_steps: 10
save_steps: 100
save_total_limit: 3
overwrite_output_dir: true

### Training Hyperparameters ###
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0

### Precision & Performance ###
bf16: true
flash_attn: fa2
ddp_timeout: 180000000

### Reporting ###
report_to: tensorboard
